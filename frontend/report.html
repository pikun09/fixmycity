<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixMyCity — Report Issue</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="topbar">
        <div class="brand">Fix<span>My</span>City</div>
        <div class="nav-links">
            <a href="index.html">Dashboard</a>
            <a href="report.html" class="active">Report</a>
            <a href="feed.html">Feed</a>
            <a href="leaderboard.html">Rankings</a>
        </div>
        <div class="auth-btn-group" id="auth-buttons">
            <button class="btn btn-outline" onclick="showModal('login-modal')">Login</button>
            <button class="btn btn-primary" onclick="showModal('register-modal')">Register</button>
        </div>
        <div class="auth-btn-group" id="user-profile" style="display:none;">
            <span id="user-info" style="font-weight: 600; color: var(--cyan-accent);">Citizen</span>
            <button class="btn btn-outline" onclick="handleLogout()" style="padding: 8px 16px; font-size: 0.85rem;">Logout</button>
        </div>
    </nav>

    <main class="content">
        <h1 class="page-title">Report a Civic Issue</h1>

        <div class="form-container">
            <form id="report-form" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="title">Issue Title</label>
                    <input type="text" id="title" class="form-control" placeholder="Brief summary (e.g., Deep pothole on 80ft road)" required>
                </div>

                <div class="form-group">
                    <label for="description">Describe the Issue</label>
                    <textarea id="description" class="form-control" placeholder="Provide details like size, hazard warnings, near landmarks, etc." required></textarea>
                </div>

                <div class="form-group">
                    <label for="location">Location Address</label>
                    <input type="text" id="location" class="form-control" placeholder="e.g. Indiranagar, 12th Main Road, Bengaluru" required>
                </div>

                <div class="form-group">
                    <label for="severity">Severity Level</label>
                    <select id="severity" class="form-control">
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                        <option value="critical">Critical</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Upload Image & AI Scan</label>
                    <div class="file-upload-wrapper">
                        <div class="file-upload-text">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 8px; color: var(--cyan-accent);">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
                            </svg>
                            <p>Drag & drop or click to choose a picture</p>
                        </div>
                        <input type="file" id="image" accept="image/*">
                    </div>
                    <img id="preview" class="image-preview">
                </div>

                <!-- AI Analysis Response Container -->
                <div id="ai-result" class="ai-panel" style="display:none; margin-top: 20px; border-color: rgba(0, 235, 255, 0.4);">
                    <h2>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--cyan-accent);">
                            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
                            <circle cx="12" cy="12" r="4"/>
                        </svg>
                        Gemini AI Analysis & Auto-Classification
                    </h2>
                    <div class="ai-panel-content" id="ai-result-text">Scanning image...</div>
                </div>

                <div style="margin-top: 30px;">
                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 15px; font-size: 1.05rem;">
                        Submit Issue Report
                    </button>
                </div>
            </form>
        </div>
    </main>

    <!-- LOGIN MODAL -->
    <div id="login-modal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">
                <h3>Login to FixMyCity</h3>
                <button class="modal-close" onclick="closeModal('login-modal')">&times;</button>
            </div>
            <form onsubmit="executeLogin(event)">
                <div class="form-group">
                    <label for="login-username">Username</label>
                    <input type="text" id="login-username" class="form-control" required placeholder="Enter username">
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" class="form-control" required placeholder="Enter password">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline" onclick="closeModal('login-modal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Login</button>
                </div>
            </form>
        </div>
    </div>

    <!-- REGISTER MODAL -->
    <div id="register-modal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">
                <h3>Register Account</h3>
                <button class="modal-close" onclick="closeModal('register-modal')">&times;</button>
            </div>
            <form onsubmit="executeRegister(event)">
                <div class="form-group">
                    <label for="reg-name">Full Name</label>
                    <input type="text" id="reg-name" class="form-control" required placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label for="reg-username">Username</label>
                    <input type="text" id="reg-username" class="form-control" required placeholder="Choose a username">
                </div>
                <div class="form-group">
                    <label for="reg-email">Email Address</label>
                    <input type="email" id="reg-email" class="form-control" required placeholder="Enter email address">
                </div>
                <div class="form-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" class="form-control" required placeholder="Create password (min 4 characters)">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline" onclick="closeModal('register-modal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Register</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/report.js"></script>
    <script>
        function checkUserAuth() {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            const authButtons = document.getElementById('auth-buttons');
            const userProfile = document.getElementById('user-profile');
            const userInfo = document.getElementById('user-info');
            
            if (user) {
                authButtons.style.display = 'none';
                userProfile.style.display = 'flex';
                userInfo.textContent = `${user.name} (${user.points || 0} XP)`;
            } else {
                authButtons.style.display = 'flex';
                userProfile.style.display = 'none';
            }
        }
        
        function showModal(id) {
            document.getElementById(id).classList.add('active');
        }
        
        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }
        
        async function executeLogin(e) {
            e.preventDefault();
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            try {
                const user = await loginUser({ username, password });
                localStorage.setItem('currentUser', JSON.stringify(user));
                closeModal('login-modal');
                checkUserAuth();
                alert('Logged in successfully!');
                window.location.reload();
            } catch (err) {
                alert('Login failed: ' + err.message);
            }
        }
        
        async function executeRegister(e) {
            e.preventDefault();
            const name = document.getElementById('reg-name').value;
            const username = document.getElementById('reg-username').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            try {
                const user = await registerUser({ name, username, email, password });
                localStorage.setItem('currentUser', JSON.stringify(user));
                closeModal('register-modal');
                checkUserAuth();
                alert('Registered successfully!');
                window.location.reload();
            } catch (err) {
                alert('Registration failed: ' + err.message);
            }
        }
        
        function handleLogout() {
            localStorage.removeItem('currentUser');
            checkUserAuth();
            alert('Logged out successfully.');
            window.location.reload();
        }

        window.addEventListener('DOMContentLoaded', checkUserAuth);
    </script>
</body>
</html>
